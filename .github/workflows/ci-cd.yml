name: Zoiko Telecom CI/CD

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write

concurrency:
  group: zoiko-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      # ---------- FRONTEND ----------
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ""           # empty = same origin, no secret needed
        run: npm run build

      - name: Upload frontend build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: zoiko-frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 14

      # ---------- BACKEND ----------
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Smoke test backend health endpoint
        working-directory: backend
        env:
          PORT: 5050
          CLIENT_ORIGIN: http://localhost:5173
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          node src/server.js &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          sleep 5
          curl --fail http://127.0.0.1:5050/api/health

      - name: Build Docker image
        run: docker build -t zoiko-telecom-ci -f Dockerfile .

      - name: Smoke test Docker image
        run: |
          docker run -d --rm --name zoiko-telecom-ci -p 8080:8080 zoiko-telecom-ci
          trap "docker stop zoiko-telecom-ci" EXIT
          sleep 5
          curl --fail http://127.0.0.1:8080/api/health

  cd:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: zoiko-frontend-dist
          path: frontend/dist            # Dockerfile copies this into the image

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      # ---------- BUILD & PUSH ----------
      - name: Build & push Docker image
        run: |
          docker build \
            -t europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zoiko/backend:${{ github.sha }} \
            -f Dockerfile .
          docker push \
            europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zoiko/backend:${{ github.sha }}

      # ---------- DEPLOY ----------
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy zoikotelecombot \
            --image europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zoiko/backend:${{ github.sha }} \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "MONGODB_URI=${{ secrets.MONGODB_URI }},NODE_ENV=production,CLIENT_ORIGIN=https://zoikotelecombot-722985113446.europe-west1.run.app"
