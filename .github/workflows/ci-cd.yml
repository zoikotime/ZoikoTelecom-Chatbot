name: Zoiko Telecom CI/CD

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write

concurrency:
  group: zoiko-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      # ---------- FRONTEND ----------
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: npm run build

      - name: Upload frontend build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: zoiko-frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 14

      # ---------- BACKEND ----------
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Smoke test backend health endpoint
        working-directory: backend
        env:
          PORT: 5050
          CLIENT_ORIGIN: http://localhost:5173
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          node src/server.js &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          sleep 5
          curl --fail http://127.0.0.1:5050/api/health

  cd:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      # ---------- BUILD & PUSH BACKEND IMAGE ----------
      - name: Build & push backend Docker image
        run: |
          docker build \
            -t europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zoiko/backend:${{ github.sha }} \
            -f Dockerfile .
          docker push europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zoiko/backend:${{ github.sha }}

      # ---------- DEPLOY BACKEND ----------
      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy zoiko-backend \
            --image europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zoiko/backend:${{ github.sha }} \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "MONGODB_URI=${{ secrets.MONGODB_URI }},NODE_ENV=production"

      # ---------- BUILD FRONTEND WITH REAL API URL ----------
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend with deployed backend URL
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: npm run build

      # ---------- DEPLOY FRONTEND ----------
      - name: Deploy frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: zoiko-frontend
          region: europe-west1
          source: ./frontend
